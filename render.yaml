services:
  - type: web
    name: finguard-ai
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://finguard-ai.onrender.com,http://localhost:5173
